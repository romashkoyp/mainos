<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mainos</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="styles.css" />

    <!-- https://dexie.org/docs/Tutorial/Hello-World -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    
    <!-- https://counter.dev/dashboard.html -->
    <script src="https://cdn.counter.dev/script.js" data-id="7eb64be9-4464-4de5-ba46-f3245c72bc8c" data-utcoffset="3"></script>
</head>
<body>
  <div id="map">
    <div id="container">
      <div class="header">
        <h3 id="tracker-title">Location Tracker</h3>
        <button id="minimize-btn" class="minimize-btn" onclick="toggleMinimize()">
          <i class="fas fa-minus"></i>
        </button>
      </div>
      <div id="tracker-content">
        <div class="progress-stats-container">
          <div class="progress-section">
            <div class="progress-header">
              <span>Progress:</span>
              <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-container">
              <div id="progress-bar"></div>
            </div>
          </div>
          <div class="stats-compact">
            <div class="stats-row-compact">
              <span>Total: <span id="total-count">0</span></span>
              <span class="visited-text">Visited: <span id="visited-count" class="visited-count">0</span></span>
              <span class="not-visited-text">Not Visited: <span id="not-visited-count" class="not-visited-count">0</span></span>
            </div>
          </div>
        </div>
        <div class="city-filter-section">
          <label for="city-filter-dropdown">Filter by City:</label>
          <select id="city-filter-dropdown" onchange="applyCityFilter(this.value)" class="city-filter-select">
            <option value="">All Cities</option>
          </select>
        </div>
        <div id="campaign-info" class="campaign-info" style="display: none;">
        </div>
        <div class="grey-markers-toggle">
          <label class="checkbox-label">
            <input
              type="checkbox"
              id="grey-markers-toggle"
              onchange="saveStateAndRender()"
              class="checkbox-input"
            />
            <span>Base markers</span>
          </label>
          <button onclick="toggleLegend()" class="btn btn-legend" title="Show/Hide marker legend">
            <i class="fas fa-map-marker-alt"></i> Legend
          </button>
        </div>
        <div id="marker-legend" class="marker-legend" style="display: none;">
          <div class="legend-header">
            <span>Marker Types</span>
          </div>
          <div class="legend-items">
            <div class="legend-item">
              <div class="legend-marker" id="legend-maxi"></div>
              <span>Maxi</span>
            </div>
            <div class="legend-item">
              <div class="legend-marker" id="legend-classic-keski"></div>
              <span>Classic Keski</span>
            </div>
            <div class="legend-item">
              <div class="legend-marker" id="legend-classic-single"></div>
              <span>Classic Single</span>
            </div>
          </div>
          <div class="legend-colors">
            <div class="legend-color-item">
              <div class="legend-color-marker" style="background-color: #7B7B7B;"></div>
              <span>Base locations (grey)</span>
            </div>
            <div class="legend-color-item">
              <div class="legend-color-marker" style="background-color: #CB2B3E;"></div>
              <span>Campaign locations (any color)</span>
            </div>
            <div class="legend-color-item">
              <div class="legend-color-marker" style="background-color: #2AAD27;"></div>
              <span>Visited locations (green)</span>
            </div>
          </div>
        </div>
        <div class="campaign-input-section">
          <div class="input-group">
            <input type="text" id="campaign-id-input" class="campaign-input" placeholder="Paste Odoo campaign URL here">
            <button onclick="loadCampaignData(event)" class="btn btn-warning">Load</button>
          </div>
        </div>
        <div class="button-container">
          <button onclick="locateUser()" class="btn btn-info" title="Find My Location">
            <i class="fas fa-crosshairs"></i> Find Me
          </button>
          <button onclick="openReportModal()" class="btn btn-warning" title="Generate Work Report">
            <i class="fas fa-file-alt"></i> Report
          </button>
          <button onclick="exportData()" class="btn btn-primary">Export</button>
          <label for="import-file" class="btn btn-success">
            Import
            <input type="file" id="import-file" accept=".json" onchange="importData(event)">
          </label>
        </div>
        <div class="control-section">
          <div class="clustering-toggle">
            <label class="checkbox-label">
              <input
                type="checkbox"
                id="clustering-toggle"
                checked
                onchange="toggleClustering(this.checked)"
                class="checkbox-input"
              />
              <span>Clustering markers</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Report Modal -->
  <div id="report-modal" class="report-modal" style="display: none;">
    <div class="report-modal-overlay" onclick="closeReportModal()"></div>
    <div class="report-modal-content">
      <div class="report-modal-header">
        <h3>Work Report</h3>
        <button class="report-modal-close" onclick="closeReportModal()" title="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="report-modal-body">
        <form id="report-form" onsubmit="generateWorkReport(event)">
          <!-- Kilometers Section -->
          <div class="report-form-section">
            <h4>Kilometers</h4>
            <div class="report-form-row">
              <div class="report-form-field">
                <label for="starting-km">Starting KM:</label>
                <input type="number" id="starting-km" name="starting-km" required min="0" step="0.1">
              </div>
              <div class="report-form-field">
                <label for="ending-km">Ending KM:</label>
                <input type="number" id="ending-km" name="ending-km" required min="0" step="0.1">
              </div>
            </div>
          </div>

          <!-- Campaigns Section -->
          <div class="report-form-section">
            <h4>Campaigns</h4>
            <div class="report-form-checkboxes">
              <label class="report-checkbox-label">
                <input type="checkbox" name="campaign" value="hoviapteekki">
                <span>Hoviapteekki</span>
              </label>
              <label class="report-checkbox-label">
                <input type="checkbox" name="campaign" value="jkl city">
                <span>JKL City</span>
              </label>
              <label class="report-checkbox-label">
                <input type="checkbox" name="campaign" value="fonum">
                <span>Fonum</span>
              </label>
              <label class="report-checkbox-label">
                <input type="checkbox" name="campaign" value="puuhamaa">
                <span>Puuhamaa</span>
              </label>
            </div>
          </div>

          <!-- Advertisements Section -->
          <div class="report-form-section">
            <h4>Advertisements Changed</h4>
            <div class="report-form-grid">
              <div class="report-form-field">
                <label for="ad-maxi">Maxi:</label>
                <input type="number" id="ad-maxi" name="ad-maxi" min="0" value="0">
              </div>
              <div class="report-form-field">
                <label for="ad-single">Single:</label>
                <input type="number" id="ad-single" name="ad-single" min="0" value="0">
              </div>
              <div class="report-form-field">
                <label for="ad-keski">Keski:</label>
                <input type="number" id="ad-keski" name="ad-keski" min="0" value="0">
              </div>
              <div class="report-form-field">
                <label for="ad-tupla">Tupla:</label>
                <input type="number" id="ad-tupla" name="ad-tupla" min="0" value="0">
              </div>
            </div>
          </div>

          <!-- Extra Work Section -->
          <div class="report-form-section">
            <h4>Extra Work</h4>
            <div class="report-form-field">
              <textarea id="extra-work" name="extra-work" rows="4" placeholder="e.g., fixing pole 10189 0,5h, shipping adds back 2h"></textarea>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="report-form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeReportModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-download"></i> Download Report
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://kit.fontawesome.com/91c7a109fb.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/nwcell/ics.js/ics.deps.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
